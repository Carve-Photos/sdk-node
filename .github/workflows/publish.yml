name: Publish to npm

on:
  push:
    tags: ["v*"]

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Verify trusted publishing OIDC context
        run: |
          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL}" ]; then
            echo "Error: ACTIONS_ID_TOKEN_REQUEST_URL is not set; id-token: write permission is required for npm trusted publishing."
            exit 1
          fi
          if [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" ]; then
            echo "Error: ACTIONS_ID_TOKEN_REQUEST_TOKEN is not set; id-token: write permission is required for npm trusted publishing."
            exit 1
          fi

      - run: npm publish --provenance --access public
